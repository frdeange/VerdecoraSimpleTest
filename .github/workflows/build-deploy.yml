name: Build & Deploy

on:
  push:
    branches: [master]
    paths:
      - '.github/workflows/build-deploy.yml'
      - 'src/**'
      - 'docker/**'
      - 'pyproject.toml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  ENVIRONMENT: ${{ vars.ENVIRONMENT != '' && vars.ENVIRONMENT || 'dev' }}
  RESOURCE_GROUP: ${{ vars.RESOURCE_GROUP != '' && vars.RESOURCE_GROUP || format('rg-verdecora-simple-{0}', vars.ENVIRONMENT != '' && vars.ENVIRONMENT || 'dev') }}
  ACR_NAME: ${{ vars.ACR_NAME }}
  ACA_ORCHESTRATOR: ${{ format('verdecora-orchestrator-{0}', vars.ENVIRONMENT != '' && vars.ENVIRONMENT || 'dev') }}
  ACA_HITL: ${{ format('verdecora-hitl-webform-{0}', vars.ENVIRONMENT != '' && vars.ENVIRONMENT || 'dev') }}
  ACA_DEDUP: ${{ format('verdecora-dedup-job-{0}', vars.ENVIRONMENT != '' && vars.ENVIRONMENT || 'dev') }}
  ACA_ESCALATION: ${{ format('verdecora-escalation-timer-{0}', vars.ENVIRONMENT != '' && vars.ENVIRONMENT || 'dev') }}
  ACA_UPLOAD_WEB: ${{ format('verdecora-upload-web-{0}', vars.ENVIRONMENT != '' && vars.ENVIRONMENT || 'dev') }}

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      orchestrator: ${{ steps.manual.outputs.orchestrator || steps.filter.outputs.orchestrator }}
      hitl: ${{ steps.manual.outputs.hitl || steps.filter.outputs.hitl }}
      dedup: ${{ steps.manual.outputs.dedup || steps.filter.outputs.dedup }}
      escalation: ${{ steps.manual.outputs.escalation || steps.filter.outputs.escalation }}
      upload-web: ${{ steps.manual.outputs.upload-web || steps.filter.outputs.upload-web }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Force all services on manual dispatch
        if: github.event_name == 'workflow_dispatch'
        id: manual
        shell: bash
        run: |
          echo 'orchestrator=true' >> "$GITHUB_OUTPUT"
          echo 'hitl=true' >> "$GITHUB_OUTPUT"
          echo 'dedup=true' >> "$GITHUB_OUTPUT"
          echo 'escalation=true' >> "$GITHUB_OUTPUT"
          echo 'upload-web=true' >> "$GITHUB_OUTPUT"

      - name: Detect changed services
        if: github.event_name != 'workflow_dispatch'
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            orchestrator:
              - '.github/workflows/build-deploy.yml'
              - 'docker/.dockerignore'
              - 'docker/orchestrator/**'
              - 'pyproject.toml'
              - 'src/agents/**'
              - 'src/config/**'
              - 'src/mcp/**'
              - 'src/models/**'
              - 'src/services/orchestrator/**'
            hitl:
              - '.github/workflows/build-deploy.yml'
              - 'docker/.dockerignore'
              - 'docker/hitl-webform/**'
              - 'pyproject.toml'
              - 'src/config/**'
              - 'src/mcp/**'
              - 'src/models/**'
              - 'src/shared/**'
              - 'src/services/hitl_webform/**'
            dedup:
              - '.github/workflows/build-deploy.yml'
              - 'docker/.dockerignore'
              - 'docker/flow0-dedup/**'
              - 'pyproject.toml'
              - 'src/config/**'
              - 'src/mcp/**'
              - 'src/models/**'
              - 'src/services/flow0_dedup/**'
            escalation:
              - '.github/workflows/build-deploy.yml'
              - 'docker/.dockerignore'
              - 'docker/escalation-timer/**'
              - 'pyproject.toml'
              - 'src/config/**'
              - 'src/mcp/**'
              - 'src/models/**'
              - 'src/services/escalation/**'
            upload-web:
              - '.github/workflows/build-deploy.yml'
              - 'docker/.dockerignore'
              - 'docker/upload-web/**'
              - 'pyproject.toml'
              - 'src/shared/**'
              - 'src/upload_web/**'

  build-orchestrator:
    needs: detect-changes
    if: needs.detect-changes.outputs.orchestrator == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push orchestrator image
        shell: bash
        run: |
          set -euo pipefail
          az acr build \
            --registry "$ACR_NAME" \
            --image "verdecora-orchestrator:${{ github.sha }}" \
            --image "verdecora-orchestrator:latest" \
            --file docker/orchestrator/Dockerfile \
            .

  deploy-orchestrator:
    needs: build-orchestrator
    if: needs.build-orchestrator.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy orchestrator
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_REF="$ACR_NAME.azurecr.io/verdecora-orchestrator:${{ github.sha }}"
          REGISTRY_SERVER="$ACR_NAME.azurecr.io"

          if ! az containerapp show --name "$ACA_ORCHESTRATOR" --resource-group "$RESOURCE_GROUP" >/dev/null 2>&1; then
            echo "::warning::Container App '$ACA_ORCHESTRATOR' not found in '$RESOURCE_GROUP'; skipping deploy. enableContainerAppWorkloads may still be false."
            exit 0
          fi

          az containerapp registry set \
            --name "$ACA_ORCHESTRATOR" \
            --resource-group "$RESOURCE_GROUP" \
            --server "$REGISTRY_SERVER" \
            --identity "system"

          az containerapp update \
            --name "$ACA_ORCHESTRATOR" \
            --resource-group "$RESOURCE_GROUP" \
            --image "$IMAGE_REF"

  build-hitl:
    needs: detect-changes
    if: needs.detect-changes.outputs.hitl == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push HITL image
        shell: bash
        run: |
          set -euo pipefail
          az acr build \
            --registry "$ACR_NAME" \
            --image "verdecora-hitl-webform:${{ github.sha }}" \
            --image "verdecora-hitl-webform:latest" \
            --file docker/hitl-webform/Dockerfile \
            .

  deploy-hitl:
    needs: build-hitl
    if: needs.build-hitl.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy HITL app
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_REF="$ACR_NAME.azurecr.io/verdecora-hitl-webform:${{ github.sha }}"
          REGISTRY_SERVER="$ACR_NAME.azurecr.io"

          if ! az containerapp show --name "$ACA_HITL" --resource-group "$RESOURCE_GROUP" >/dev/null 2>&1; then
            echo "::warning::Container App '$ACA_HITL' not found in '$RESOURCE_GROUP'; skipping deploy. enableContainerAppWorkloads may still be false."
            exit 0
          fi

          az containerapp registry set \
            --name "$ACA_HITL" \
            --resource-group "$RESOURCE_GROUP" \
            --server "$REGISTRY_SERVER" \
            --identity "system"

          az containerapp update \
            --name "$ACA_HITL" \
            --resource-group "$RESOURCE_GROUP" \
            --image "$IMAGE_REF"

  build-dedup:
    needs: detect-changes
    if: needs.detect-changes.outputs.dedup == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push dedup image
        shell: bash
        run: |
          set -euo pipefail
          az acr build \
            --registry "$ACR_NAME" \
            --image "verdecora-flow0-dedup:${{ github.sha }}" \
            --image "verdecora-flow0-dedup:latest" \
            --file docker/flow0-dedup/Dockerfile \
            .

  deploy-dedup:
    needs: build-dedup
    if: needs.build-dedup.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy dedup job
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_REF="$ACR_NAME.azurecr.io/verdecora-flow0-dedup:${{ github.sha }}"
          REGISTRY_SERVER="$ACR_NAME.azurecr.io"

          if ! az containerapp job show --name "$ACA_DEDUP" --resource-group "$RESOURCE_GROUP" >/dev/null 2>&1; then
            echo "::warning::Container App Job '$ACA_DEDUP' not found in '$RESOURCE_GROUP'; skipping deploy. enableContainerAppWorkloads may still be false."
            exit 0
          fi

          az containerapp job registry set \
            --name "$ACA_DEDUP" \
            --resource-group "$RESOURCE_GROUP" \
            --server "$REGISTRY_SERVER" \
            --identity "system"

          az containerapp job update \
            --name "$ACA_DEDUP" \
            --resource-group "$RESOURCE_GROUP" \
            --image "$IMAGE_REF"

  build-escalation:
    needs: detect-changes
    if: needs.detect-changes.outputs.escalation == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push escalation image
        shell: bash
        run: |
          set -euo pipefail
          az acr build \
            --registry "$ACR_NAME" \
            --image "verdecora-escalation-timer:${{ github.sha }}" \
            --image "verdecora-escalation-timer:latest" \
            --file docker/escalation-timer/Dockerfile \
            .

  deploy-escalation:
    needs: build-escalation
    if: needs.build-escalation.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy escalation job
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_REF="$ACR_NAME.azurecr.io/verdecora-escalation-timer:${{ github.sha }}"
          REGISTRY_SERVER="$ACR_NAME.azurecr.io"

          if ! az containerapp job show --name "$ACA_ESCALATION" --resource-group "$RESOURCE_GROUP" >/dev/null 2>&1; then
            echo "::warning::Container App Job '$ACA_ESCALATION' not found in '$RESOURCE_GROUP'; skipping deploy. enableContainerAppWorkloads may still be false."
            exit 0
          fi

          az containerapp job registry set \
            --name "$ACA_ESCALATION" \
            --resource-group "$RESOURCE_GROUP" \
            --server "$REGISTRY_SERVER" \
            --identity "system"

          az containerapp job update \
            --name "$ACA_ESCALATION" \
            --resource-group "$RESOURCE_GROUP" \
            --image "$IMAGE_REF"

  build-upload-web:
    needs: detect-changes
    if: needs.detect-changes.outputs.upload-web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push upload-web image
        shell: bash
        run: |
          set -euo pipefail
          az acr build \
            --registry "$ACR_NAME" \
            --image "verdecora-upload-web:${{ github.sha }}" \
            --image "verdecora-upload-web:latest" \
            --file docker/upload-web/Dockerfile \
            .

  deploy-upload-web:
    needs: build-upload-web
    if: needs.build-upload-web.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy upload-web
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_REF="$ACR_NAME.azurecr.io/verdecora-upload-web:${{ github.sha }}"
          REGISTRY_SERVER="$ACR_NAME.azurecr.io"

          if ! az containerapp show --name "$ACA_UPLOAD_WEB" --resource-group "$RESOURCE_GROUP" >/dev/null 2>&1; then
            echo "::warning::Container App '$ACA_UPLOAD_WEB' not found in '$RESOURCE_GROUP'; skipping deploy."
            exit 0
          fi

          az containerapp registry set \
            --name "$ACA_UPLOAD_WEB" \
            --resource-group "$RESOURCE_GROUP" \
            --server "$REGISTRY_SERVER" \
            --identity "system"

          az containerapp update \
            --name "$ACA_UPLOAD_WEB" \
            --resource-group "$RESOURCE_GROUP" \
            --image "$IMAGE_REF"
