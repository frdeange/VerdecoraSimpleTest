name: Build & Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  LOCATION: swedencentral
  ENVIRONMENT: ${{ vars.ENVIRONMENT != '' && vars.ENVIRONMENT || 'dev' }}
  RESOURCE_GROUP: ${{ vars.RESOURCE_GROUP != '' && vars.RESOURCE_GROUP || 'rg-verdecora-simple' }}
  ACR_NAME: ${{ vars.ACR_NAME != '' && vars.ACR_NAME || format('acralbaranes{0}', vars.ENVIRONMENT != '' && vars.ENVIRONMENT || 'dev') }}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Bicep
        run: az bicep build --file infra/modules/main.bicep

  deploy-infra:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy infrastructure
        shell: bash
        run: |
          set -euo pipefail
          az deployment sub create \
            --location "$LOCATION" \
            --template-file infra/modules/main.bicep \
            --parameters environment="$ENVIRONMENT" enableUploadWeb=true

  build-and-push:
    needs: deploy-infra
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: verdecora-orchestrator
            dockerfile: docker/orchestrator/Dockerfile
          - image: verdecora-flow0-dedup
            dockerfile: docker/flow0-dedup/Dockerfile
          - image: verdecora-hitl-webform
            dockerfile: docker/hitl-webform/Dockerfile
          - image: verdecora-escalation-timer
            dockerfile: docker/escalation-timer/Dockerfile
          - image: verdecora-upload-web
            dockerfile: docker/upload-web/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push image
        shell: bash
        run: |
          set -euo pipefail
          az acr build \
            --registry "$ACR_NAME" \
            --image "${{ matrix.image }}:${{ github.sha }}" \
            --image "${{ matrix.image }}:latest" \
            --file "${{ matrix.dockerfile }}" \
            .

  deploy-apps:
    needs: build-and-push
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - command: containerapp
            name: verdecora-orchestrator
            image: verdecora-orchestrator
          - command: job
            name: verdecora-dedup-job
            image: verdecora-flow0-dedup
          - command: containerapp
            name: verdecora-hitl-webform
            image: verdecora-hitl-webform
          - command: job
            name: verdecora-escalation-timer
            image: verdecora-escalation-timer
          - command: containerapp
            name: verdecora-upload-web
            image: verdecora-upload-web
    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy workload
        shell: bash
        run: |
          set -euo pipefail
          target_name="${{ matrix.name }}-$ENVIRONMENT"
          image="$ACR_NAME.azurecr.io/${{ matrix.image }}:${{ github.sha }}"

          if [ "${{ matrix.command }}" = "containerapp" ]; then
            az containerapp update \
              --name "$target_name" \
              --resource-group "$RESOURCE_GROUP" \
              --image "$image"
          else
            az containerapp job update \
              --name "$target_name" \
              --resource-group "$RESOURCE_GROUP" \
              --image "$image"
          fi
