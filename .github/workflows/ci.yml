name: CI Pipeline

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12']
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      
      - name: Lint with ruff
        run: ruff check --fix src/ tests/
      
      - name: Format check with ruff
        run: ruff format --check src/ tests/ || echo 'Format issues found (non-blocking)'
      
      - name: Type check with mypy
        run: mypy src/ || true
      
      - name: Run unit tests with coverage
        run: pytest tests/unit/ -v --cov=src --cov-report=html || true
      
      - name: Run integration tests
        run: pytest tests/integration/ -v || true
      
      - name: Upload test coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 30
      
      - name: Validate Bicep files
        run: |
          az bicep build --file infra/modules/main.bicep || echo "Bicep file not yet present, skipping validation"
        continue-on-error: true
