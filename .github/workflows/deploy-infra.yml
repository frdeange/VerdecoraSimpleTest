name: Deploy Infrastructure

on:
  push:
    branches: [master]
    paths:
      - 'infra/**'
      - '.github/workflows/deploy-infra.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  LOCATION: swedencentral
  ENVIRONMENT: ${{ vars.ENVIRONMENT != '' && vars.ENVIRONMENT || 'dev' }}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Bicep
        run: az bicep build --file infra/modules/main.bicep

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy infrastructure
        shell: bash
        run: |
          set -euo pipefail
          az deployment sub create \
            --location "$LOCATION" \
            --template-file infra/modules/main.bicep \
            --parameters environment="$ENVIRONMENT" enableUploadWeb=true
