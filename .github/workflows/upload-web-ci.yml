name: Upload Web CI

on:
  pull_request:
    branches:
      - master
    paths:
      - 'src/upload_web/**'
      - 'docker/upload-web/**'
      - '.github/workflows/upload-web-ci.yml'

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff check
        run: python -m ruff check src/upload_web src/shared

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run targeted tests
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(tests/unit/test_upload_web* tests/unit/test_store* tests/unit/test_jinja*)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No targeted upload-web tests found"
            exit 1
          fi

          python -m pytest "${files[@]}"

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build upload-web image
        run: docker build --file docker/upload-web/Dockerfile --tag verdecora-upload-web:ci .
