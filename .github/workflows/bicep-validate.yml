name: Bicep Validation

on:
  pull_request:
    branches:
      - master
    paths:
      - 'infra/**'
      - '.github/workflows/bicep-validate.yml'

permissions:
  contents: read

jobs:
  validate-bicep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Bicep files
        shell: bash
        run: |
          set -euo pipefail
          shopt -s globstar nullglob

          bicep_files=(infra/**/*.bicep)
          param_files=(infra/**/*.bicepparam)

          for file in "${bicep_files[@]}"; do
            echo "Validating $file"
            az bicep build --file "$file"
          done

          for file in "${param_files[@]}"; do
            echo "Validating $file"
            az bicep build-params --file "$file"
          done
